version: '3.8'

services:
  selenium-hub:
    image: selenium/hub:4.18.1
    container_name: selenium-hub
    ports:
      - "4442:4442"
      - "4443:4443"
      - "4444:4444"
    networks:
      - selenium-network

  chrome-node:
    image: selenium/node-chrome:4.18.1
    container_name: chrome-node
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=5
    networks:
      - selenium-network

  firefox-node:
    image: selenium/node-firefox:4.18.1
    container_name: firefox-node
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=3
    networks:
      - selenium-network

  test-runner:
    build: .
    container_name: test-runner
    depends_on:
      - chrome-node
      - firefox-node
    environment:
      - SELENIUM_GRID_URL=http://selenium-hub:4444/wd/hub
      - env=staging
      - browser=chrome
      - headless=true
    volumes:
      - ./target:/app/target
      - ./allure-results:/app/allure-results
    networks:
      - selenium-network
    command: >
      mvn clean test
      -Dsuite.file=testng-suites/regression.xml
      -Denv=staging
      -Dbrowser=chrome
      -Dheadless=true

networks:
  selenium-network:
    driver: bridge